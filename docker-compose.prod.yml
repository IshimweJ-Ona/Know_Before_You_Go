services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-LIV@jona@098}
      MYSQL_DATABASE: ${DB_NAME:-ai_db}
      MYSQL_USER: ${DB_USER:-kbyg_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-kbyg_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/data:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-change_me_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    environment:
      PORT: "5000"
      DB_HOST: mysql
    ports:
      - "5000:5000"
    command: ["node", "main.js"]

volumes:
  mysql_data:
