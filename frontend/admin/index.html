<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KBYG Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">KBYG</div>
      <div class="login-sub">Admin Dashboard</div>
      <div class="login-tabs">
        <button class="tab-btn on" id="tab-login" onclick="showAuth('login')">Login</button>
        <button class="tab-btn" id="tab-signup" onclick="showAuth('signup')">Sign up</button>
      </div>
      <div class="f-error" id="login-err"></div>
      <div id="login-form">
        <div class="f-group">
          <label class="f-label" for="login-email">Email</label>
          <input type="email" class="f-input" id="login-email" placeholder="admin@kbyg.com" autocomplete="email">
        </div>
        <div class="f-group">
          <label class="f-label" for="login-password">Password</label>
          <input type="password" class="f-input" id="login-password" placeholder="Password" autocomplete="current-password">
        </div>
        <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
      </div>

      <div id="signup-form" style="display:none;">
        <div class="f-group">
          <label class="f-label" for="signup-name">Full name</label>
          <input type="text" class="f-input" id="signup-name" placeholder="Admin name" autocomplete="name">
        </div>
        <div class="f-group">
          <label class="f-label" for="signup-email">Email</label>
          <input type="email" class="f-input" id="signup-email" placeholder="admin@kbyg.com" autocomplete="email">
        </div>
        <div class="f-group">
          <label class="f-label" for="signup-password">Password</label>
          <input type="password" class="f-input" id="signup-password" placeholder="Password" autocomplete="new-password">
        </div>
        <div class="f-group">
          <label class="f-label" for="signup-token">Setup token</label>
          <input type="password" class="f-input" id="signup-token" placeholder="First-admin setup token">
        </div>
        <button class="btn-primary" id="signup-btn" onclick="doSignup()">Create account</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <aside id="sidebar">
      <div class="sidebar-logo">KBYG</div>
      <nav class="sidebar-nav">
        <button class="nav-item on" onclick="showTab('overview')" id="tab-overview">
          Overview
        </button>
        <button class="nav-item" onclick="showTab('subscribers')" id="tab-subscribers">
          Subscribers
        </button>
        <button class="nav-item" onclick="showTab('feedback')" id="tab-feedback">
          Feedback
        </button>
        <button class="nav-item" onclick="showTab('countries')" id="tab-countries">
          Countries
        </button>
      </nav>
      <button class="logout-btn" onclick="doLogout()">
        Sign out
      </button>
    </aside>

    <main id="main">

      <!-- OVERVIEW TAB -->
      <div class="tab-panel on" id="panel-overview">
        <div class="page-header">
          <h1 class="page-title">Overview</h1>
          <span class="page-date" id="today-date"></span>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Subscribers</div>
            <div class="stat-value" id="stat-subs">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Feedback Entries</div>
            <div class="stat-value" id="stat-feedback">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Countries Active</div>
            <div class="stat-value" id="stat-countries">10</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">New This Week</div>
            <div class="stat-value" id="stat-new">—</div>
          </div>
        </div>
        <div class="section-card">
          <div class="section-title">Recent Subscribers</div>
          <div id="recent-subs-list"></div>
        </div>
      </div>

      <!-- SUBSCRIBERS TAB -->
      <div class="tab-panel" id="panel-subscribers">
        <div class="page-header">
          <h1 class="page-title">Subscribers</h1>
          <div class="header-actions">
            <input type="text" class="search-input" placeholder="Search by name or email..." oninput="filterTable('subs-table', this.value)">
            <button class="btn-export" onclick="exportCSV('subs-table', 'subscribers')">Export CSV</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data-table" id="subs-table">
            <thead><tr><th>Name</th><th>Email</th><th>Subscribed</th><th>Status</th></tr></thead>
            <tbody id="subs-body"></tbody>
          </table>
        </div>
      </div>

      <!-- FEEDBACK TAB -->
      <div class="tab-panel" id="panel-feedback">
        <div class="page-header">
          <h1 class="page-title">Feedback</h1>
          <div class="header-actions">
            <input type="text" class="search-input" placeholder="Search feedback..." oninput="filterTable('feedback-table', this.value)">
            <button class="btn-export" onclick="exportCSV('feedback-table', 'feedback')">Export CSV</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data-table" id="feedback-table">
            <thead><tr><th>Name</th><th>Email</th><th>Country</th><th>Message</th><th>Date</th></tr></thead>
            <tbody id="feedback-body"></tbody>
          </table>
        </div>
      </div>

      <!-- COUNTRIES TAB -->
      <div class="tab-panel" id="panel-countries">
        <div class="page-header">
          <h1 class="page-title">Countries</h1>
        </div>
        <div class="countries-layout">
          <div class="countries-grid" id="countries-grid"></div>
          <div class="country-editor">
            <div class="section-title">Edit Country</div>
            <div class="editor-empty" id="editor-empty">Select a country to edit transportation and housing details.</div>
            <div id="editor-form" style="display:none;">
              <div class="editor-title" id="editor-title"></div>
              <div class="f-group">
                <label class="f-label" for="edit-transportation">Transportation</label>
                <textarea class="f-input f-textarea" id="edit-transportation" rows="5" placeholder="Add transportation notes..."></textarea>
              </div>
              <div class="f-group">
                <label class="f-label" for="edit-housing">Housing</label>
                <textarea class="f-input f-textarea" id="edit-housing" rows="5" placeholder="Add housing notes..."></textarea>
              </div>
              <button class="btn-primary" id="save-country-btn" onclick="saveCountry()">Save changes</button>
              <div class="editor-msg" id="editor-msg"></div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
