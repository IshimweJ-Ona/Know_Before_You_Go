<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Info — Know Before You Go</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .page-header {
      background: var(--navy);
      color: white;
      padding: 36px 24px;
      border-bottom: 3px solid var(--teal);
    }
    .page-header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }
    .back-link {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .back-link:hover { color: var(--teal); }
    .page-header h1 {
      font-family: Georgia, serif;
      font-size: 32px;
      margin-bottom: 4px;
    }
    .page-header p { color: rgba(255,255,255,0.55); font-size: 14px; }
    .content-area  { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .sections-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .section-full  { grid-column: 1 / -1; }
    @media (max-width: 700px) {
      .sections-grid { grid-template-columns: 1fr; }
      .section-full  { grid-column: auto; }
    }
  </style>
</head>
<body>

  <div id="navbar-mount" data-active="home"></div>

  <div class="page-header">
    <div class="page-header-inner">
      <a href="index.html" class="back-link">Back to country selector</a>
      <h1 id="country-name">Loading...</h1>
      <p>Travel information and entry requirements</p>
    </div>
  </div>

  <div id="page-loading" class="center-state" style="min-height:300px">
    <div class="spinner spinner-lg"></div>
    <p class="grey-text">Loading travel information...</p>
  </div>

  <div id="page-error" class="center-state" style="display:none;min-height:300px">
    <p class="error-text" id="error-msg">Something went wrong.</p>
    <a href="index.html" class="btn-primary">Back to Home</a>
  </div>

  <div id="page-content" class="content-area" style="display:none">
    <div class="sections-grid">

      <div class="info-card fade-up">
        <div class="info-card-header">Visa Requirements</div>
        <div class="info-card-body" id="visa-body">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="info-card fade-up delay-1">
        <div class="info-card-header">Health Documentation</div>
        <div class="info-card-body" id="health-body">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="info-card section-full fade-up delay-2">
        <div class="info-card-header">Dos and Don'ts</div>
        <div class="info-card-body" id="dosdont-body">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="info-card fade-up delay-3">
        <div class="info-card-header">General Entry Requirements</div>
        <div class="info-card-body" id="general-body">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="info-card fade-up delay-4">
        <div class="info-card-header">Emergency Contacts</div>
        <div class="info-card-body" id="emergency-body">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/country.js"></script>
</body>
</html>
